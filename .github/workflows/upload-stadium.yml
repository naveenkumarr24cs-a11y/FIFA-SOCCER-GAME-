name: Download and commit stadium

on:
  push:
    paths:
      - '.github/workflows/upload-stadium.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download stadium.glb
        run: |
          mkdir -p public
          curl -L -o public/stadium.glb https://tmpfiles.org/dl/w1wbgjxTNkK9/stadium.glb
          ls -lh public/stadium.glb

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/stadium.glb
          git commit -m "Add stadium.glb via workflow" || echo "No changes to commit"
          git push origin main
